name: Compilation Executable

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement à tout moment

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Recuperer le code source
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer les dependances
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller gradio
        # Si introspection.py utilise d'autres bibliotheques (comme pandas, numpy, etc.),
        # tu peux les ajouter ici, par exemple : pip install pandas numpy

    - name: Compilation avec PyInstaller
      run: |
        pyinstaller --clean --collect-all gradio --onefile introspection.py

    - name: Televerser l'executable
      uses: actions/upload-artifact@v4
      with:
        name: Application-Windows
        path: dist/introspection.exe

