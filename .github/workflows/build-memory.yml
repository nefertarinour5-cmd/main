name: Generer l'executable Windows

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Recuperer le code
      uses: actions/checkout@v4

    - name: Configurer Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Installer PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Compiler en .exe
      run: pyinstaller --onefile main.py

    - name: Telecharger l'artifact
      uses: actions/upload-artifact@v4
      with:
        name: MonApplicationWindows
        path: dist/*.exe
